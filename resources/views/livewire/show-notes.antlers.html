<div class="p-4 bg-gray-100 rounded-lg">
    <h2 class="text-xl font-bold mb-4">Latest notes</h2>

    {{collection:notes sort="date:asc" }}
        <div class="mb-3 p-3 bg-white shadow rounded-lg">
            <h3 class="text-xl font-semibold">{{ title }}</h3>
            <p>{{ content }}</p>
        </div>
    {{ /collection:notes }}
</div>
