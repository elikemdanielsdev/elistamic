<!DOCTYPE html>
<html lang="{{ site:short_locale }}">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{ title ?? site:name }}</title>
        <link rel="preconnect" href="https://rsms.me/" />
        <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
        {{ livewire:styles }} {{ vite
        src="resources/js/site.js|resources/css/site.css" }}
    </head>
    <body class="bg-rose-100 font-inter leading-normal text-gray-800">
        <div
            class="mx-auto px-2 lg:min-h-screen flex flex-col items-center justify-center"
        >
            {{ template_content }}
        </div>
        {{ livewire:scripts }}
    </body>
</html>
